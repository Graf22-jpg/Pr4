<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Геометричні фігури CSS (Float & Centered)</title>
    <style>

        body {
            background-color: #222222;
            margin: 0;
            padding: 40px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ccc;
        }

        .container::after,
        .target-container::after {
            content: "";
            display: table;
            clear: both;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .shape-wrapper {
            float: left;
            width: 220px;
            min-height: 280px;
            background: #111111;
            padding: 20px;
            margin: 15px;
            border-radius: 15px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .shape-wrapper span {
            display: block;
            margin-bottom: 30px;
            font-size: 13px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .shape-wrapper > div {
            margin: 0 auto;
            display: block;
        }

        #circle { width: 120px; height: 120px; background-color: #746fdd; border-radius: 50%; }
        #square { width: 120px; height: 120px; background-color: #f447ff; }
        #rectangle { width: 180px; height: 100px; background-color: #4242ff; }
        #oval { width: 180px; height: 100px; background-color: #e9337c; border-radius: 100px / 50px; }

        #triangle { width: 0; height: 0; border-left: 60px solid transparent; border-right: 60px solid transparent; border-bottom: 120px solid #888811; }
        #triangle_down { width: 0; height: 0; border-left: 60px solid transparent; border-right: 60px solid transparent; border-top: 120px solid #1188aa; }
        #triangle_left { width: 0; height: 0; border-top: 60px solid transparent; border-bottom: 60px solid transparent; border-right: 120px solid #118811; }
        #triangle_right { width: 0; height: 0; border-top: 60px solid transparent; border-bottom: 60px solid transparent; border-left: 120px solid #aa4411; }

        #diamond {
            width: 80px; height: 80px; background-color: #1eff00;
            transform: rotate(-45deg);
            transform-origin: center;
            margin: 20px auto !important;
        }
        
        #trapezium { width: 80px; height: 0; border-bottom: 100px solid #ec3504; border-left: 40px solid transparent; border-right: 40px solid transparent; }
        #parallelogram { width: 140px; height: 90px; background-color: #8734f7; transform: skew(20deg); margin-top: 10px; }
        
        #hexagon { width: 100px; height: 55px; background-color: #fc5e5e; position: relative; margin: 40px auto; }
        #hexagon:before { content: ""; position: absolute; top: -25px; left: 0; border-left: 50px solid transparent; border-right: 50px solid transparent; border-bottom: 25px solid #fc5e5e; }
        #hexagon:after { content: ""; position: absolute; bottom: -25px; left: 0; border-left: 50px solid transparent; border-right: 50px solid transparent; border-top: 25px solid #fc5e5e; }

        #octagon { width: 100px; height: 44px; background: #ac60da; position: relative; margin: 45px auto; }
        #octagon:before { content: ""; position: absolute; top: -30px; left: 0; width: 44px; border-left: 28px solid transparent; border-right: 28px solid transparent; border-bottom: 30px solid #ac60da; }
        #octagon:after { content: ""; position: absolute; bottom: -30px; left: 0; width: 44px; border-left: 28px solid transparent; border-right: 28px solid transparent; border-top: 30px solid #ac60da; }

        /* --- ЗІРКИ ТА ІНШЕ --- */
        #star-five { margin: 50px auto !important; position: relative; color: #ff5a00; width: 0; height: 0; border-right: 100px solid transparent; border-bottom: 70px solid #ff5a00; border-left: 100px solid transparent; transform: rotate(35deg); }
        #star-five:before { border-bottom: 80px solid #ff5a00; border-left: 30px solid transparent; border-right: 30px solid transparent; position: absolute; height: 0; width: 0; top: -45px; left: -65px; content: ""; transform: rotate(-35deg); }
        #star-five:after { position: absolute; top: 3px; left: -105px; width: 0; border-right: 100px solid transparent; border-bottom: 70px solid #ff5a00; border-left: 100px solid transparent; transform: rotate(-70deg); content: ""; }

        #star-six { width: 0; height: 0; position: relative; border-left: 50px solid transparent; border-right: 50px solid transparent; border-bottom: 100px solid #de34f7; margin-bottom: 40px; }
        #star-six:after { content: ""; position: absolute; width: 0; height: 0; border-left: 50px solid transparent; border-right: 50px solid transparent; border-top: 100px solid #de34f7; top: 30px; left: -50px; }

        #pentagon { position: relative; width: 54px; border-width: 50px 18px 0; border-style: solid; border-color: #277bab transparent; margin-top: 60px; }
        #pentagon:before { content: ""; position: absolute; top: -85px; left: -18px; border-width: 0 45px 35px; border-style: solid; border-color: transparent transparent #277bab; }

        #heart { position: relative; width: 100px; height: 90px; margin-top: 20px; }
        #heart:before, #heart:after { content: ""; position: absolute; left: 50px; top: 0; width: 50px; height: 80px; background-color: #fc2e5a; border-radius: 50px 50px 0 0; transform: rotate(-45deg); transform-origin: 0 100%; }
        #heart:after { left: 0; transform: rotate(45deg); transform-origin: 100% 100%; }

        #infinity { position: relative; width: 212px; height: 100px; transform: scale(0.7); }
        #infinity:before, #infinity:after { content: ""; position: absolute; top: 0; left: 0; width: 60px; height: 60px; border: 20px solid #8734f7; border-radius: 50px 50px 0 50px; transform: rotate(-45deg); }
        #infinity:after { left: auto; right: 0; border-radius: 50px 50px 50px 0; transform: rotate(45deg); }

        #pacman { width: 0; height: 0; border-right: 60px solid transparent; border-top: 60px solid #fcf921; border-left: 60px solid #fcf921; border-bottom: 60px solid #fcf921; border-radius: 60px; }
        
        #comment-bubble { width: 120px; height: 80px; background-color: #4da; position: relative; border-radius: 10px; margin-top: 20px; }
        #comment-bubble:after { content: ""; position: absolute; bottom: -20px; left: 30px; border-width: 20px 20px 0; border-style: solid; border-color: #4da transparent; }

        .task-section {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 2px solid #333;
            text-align: center;
            clear: both;
        }

        .target-container {
            width: 100%;
            padding: 40px 0;
            text-align: center;
        }

        .target-container .shape-wrapper {
            float: none;
            display: inline-block;
            vertical-align: top;
            margin: 20px;
        }

        .target-shadow {
            width: 120px; height: 120px; background-color: white; border-radius: 50%;
            line-height: 120px; font-family: serif; font-size: 50px; color: black;
            box-shadow: 0 0 0 40px yellow, 0 0 0 80px blue;
            margin: 80px auto !important;
        }

        .target-gradient {
            width: 280px; height: 280px; border-radius: 50%;
            line-height: 280px; font-family: serif; font-size: 50px; color: black;
            background: radial-gradient(circle, white 0%, white 33%, yellow 33%, yellow 66%, blue 66%, blue 100%);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="shape-wrapper"><span>Коло</span><div id="circle"></div></div>
    <div class="shape-wrapper"><span>Квадрат</span><div id="square"></div></div>
    <div class="shape-wrapper"><span>Прямокутник</span><div id="rectangle"></div></div>
    <div class="shape-wrapper"><span>Овал</span><div id="oval"></div></div>
    <div class="shape-wrapper"><span>Трикутник</span><div id="triangle"></div></div>
    <div class="shape-wrapper"><span>Трикутник вниз</span><div id="triangle_down"></div></div>
    <div class="shape-wrapper"><span>Трикутник вліво</span><div id="triangle_left"></div></div>
    <div class="shape-wrapper"><span>Трикутник вправо</span><div id="triangle_right"></div></div>
    <div class="shape-wrapper"><span>Ромб</span><div id="diamond"></div></div>
    <div class="shape-wrapper"><span>Трапеція</span><div id="trapezium"></div></div>
    <div class="shape-wrapper"><span>Паралелограм</span><div id="parallelogram"></div></div>
    <div class="shape-wrapper"><span>Шестикутник</span><div id="hexagon"></div></div>
    <div class="shape-wrapper"><span>Восьмикутник</span><div id="octagon"></div></div>
    <div class="shape-wrapper"><span>Зірка 5-кутна</span><div id="star-five"></div></div>
    <div class="shape-wrapper"><span>Зірка 6-кутна</span><div id="star-six"></div></div>
    <div class="shape-wrapper"><span>П'ятикутник</span><div id="pentagon"></div></div>
    <div class="shape-wrapper"><span>Серце</span><div id="heart"></div></div>
    <div class="shape-wrapper"><span>Нескінченність</span><div id="infinity"></div></div>
    <div class="shape-wrapper"><span>Пакман</span><div id="pacman"></div></div>
    <div class="shape-wrapper"><span>Бабл</span><div id="comment-bubble"></div></div>
</div>

<div class="task-section">
    <h2>Завдання 2: Мішень (UA)</h2>
    <div class="target-container">
        <div class="shape-wrapper" style="width: 350px; min-height: 350px;">
            <span>Спосіб 1: box-shadow</span>
            <div class="target-shadow">UA</div>
        </div>
        <div class="shape-wrapper" style="width: 350px; min-height: 350px;">
            <span>Спосіб 2: radial-gradient</span>
            <div class="target-gradient">UA</div>
        </div>
    </div>
</div>

</body>
</html>
